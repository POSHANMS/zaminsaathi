version: '3.8'

services:
  frontend:
    image: python:3.11-slim
    volumes:
      - ../frontend:/app
    working_dir: /app
    command: python serve.py
    ports:
      - "3000:3000"

  agents:
    build:
      context: ..
      dockerfile: Dockerfile
    env_file:
      - ../.env
    ports:
      - "8000:8000"
